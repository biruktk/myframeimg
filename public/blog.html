<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <title>MyFrame Blog</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root { --primary:#DC2626; --border:#FECACA; --text:#1A1A1A; --muted:#666; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif; color:var(--text); background:#FFFFFF; }
    .nav { position:sticky; top:0; z-index:10; background:rgba(255,255,255,.88); backdrop-filter:blur(18px); border-bottom:.5px solid var(--border); }
    .nav-shell { max-width:1240px; margin:0 auto; padding:16px 24px; display:flex; align-items:center; justify-content:space-between; gap:24px; }
    .brand-logo { max-height:40px; }
    .back { color:var(--text); text-decoration:none; font-weight:600; }
    .page { max-width:1100px; margin:0 auto; padding:72px 24px 96px; }
    .eyebrow { color:var(--primary); font-weight:700; text-transform:uppercase; letter-spacing:.08em; font-size:12px; margin-bottom:14px; }
    h1 { font-size:54px; letter-spacing:-.03em; margin-bottom:18px; }
    .lede { font-size:22px; color:var(--muted); line-height:1.5; margin-bottom:28px; max-width:780px; }
    .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:18px; }
    .card { background:#fff; border:1px solid rgba(254,202,202,.7); border-radius:18px; padding:24px; box-shadow:0 18px 44px rgba(17,24,39,.06); }
    .card-link { display:block; text-decoration:none; color:inherit; height:100%; }
    .thumb { aspect-ratio:16/10; overflow:hidden; border-radius:14px; margin-bottom:14px; background:#F3F4F6; border:1px solid rgba(254,202,202,.55); }
    .thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .card h2 { font-size:28px; margin-bottom:10px; }
    .meta { color:var(--muted); font-size:14px; margin-bottom:14px; }
    .excerpt { color:#2A2A2A; line-height:1.7; display:-webkit-box; -webkit-box-orient:vertical; -webkit-line-clamp:4; overflow:hidden; }
    .read { color:var(--primary); font-weight:700; font-size:15px; margin-top:14px; display:inline-flex; align-items:center; gap:8px; }
    @media (max-width: 900px) { .grid { grid-template-columns:1fr; } h1 { font-size:40px; } .lede { font-size:18px; } }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-shell">
      <a id="homeLink" href="/"><img class="brand-logo" src="/assets/myframe-logo-final.svg" alt="MyFrame"></a>
      <a class="back" id="backLink" href="/">Back to MyFrame</a>
    </div>
  </nav>
  <main class="page">
    <div class="eyebrow" id="eyebrow">MyFrame</div>
    <h1 id="title">Blog</h1>
    <p class="lede" id="lede">Stories, updates and product notes from the MyFrame team.</p>
    <section class="grid" id="blogGrid"></section>
  </main>
  <script>
    (async function () {
      const parts = location.pathname.split('/').filter(Boolean);
      const lang = ['en','zh','es','fr','de','ja'].includes(parts[0]) ? parts[0] : 'en';
      const [site, blogs] = await Promise.all([
        fetch('/api/public/site').then(r => r.json()).catch(() => null),
        fetch('/api/public/blogs').then(r => r.json()).catch(() => [])
      ]);
      const tr = lang === 'en' ? {} : ((site?.translations || {})[lang] || {});
      const page = site?.contentPages?.[lang]?.blog || site?.contentPages?.en?.blog || { title: 'Blog', excerpt: 'Stories, updates and product notes from the MyFrame team.' };
      document.documentElement.lang = lang;
      document.title = `${page.title} | MyFrame`;
      let md = document.querySelector('meta[name="description"]');
      if (!md) { md = document.createElement('meta'); md.name = 'description'; document.head.appendChild(md); }
      md.content = String(page.excerpt || page.title || '').slice(0, 320);
      let can = document.querySelector('link[rel="canonical"]');
      if (!can) { can = document.createElement('link'); can.rel = 'canonical'; document.head.appendChild(can); }
      can.href = lang === 'en' ? `${location.origin}/blog` : `${location.origin}/${lang}/blog`;
      document.getElementById('title').textContent = page.title;
      document.getElementById('lede').textContent = page.excerpt || '';
      document.getElementById('homeLink').href = lang === 'en' ? '/' : `/${lang}`;
      document.getElementById('backLink').href = lang === 'en' ? '/' : `/${lang}`;
      document.getElementById('backLink').textContent = tr.successBackHome || 'Back to MyFrame';
      const prefix = lang === 'en' ? '/blog/' : '/' + lang + '/blog/';
      document.getElementById('blogGrid').innerHTML = blogs.length
        ? blogs.map((blog) => {
            const url = `${prefix}${encodeURIComponent(String(blog.slug || '').replace(/^\/+|\/+$/g, ''))}`;
            const src = blog.featured_image ? (String(blog.featured_image).startsWith('/') ? blog.featured_image : '/' + blog.featured_image) : '';
            const thumb = src
              ? `<div class="thumb"><img src="${escapeHtml(src)}" alt="" loading="lazy"></div>`
              : '';
            return `<article class="card"><a class="card-link" href="${escapeHtml(url)}">${thumb}<h2>${escapeHtml(blog.title)}</h2><div class="meta">${new Date(blog.created_at).toLocaleDateString()}</div><p class="excerpt">${escapeHtml(blog.excerpt || '')}</p><span class="read">Read article <i class="fas fa-arrow-right"></i></span></a></article>`;
          }).join('')
        : `<article class="card"><h2>${escapeHtml(page.title)}</h2><p class="excerpt">${escapeHtml(page.excerpt || '')}</p></article>`;
      function escapeHtml(value) {
        return String(value ?? '').replace(/[&<>"']/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));
      }
    })();
  </script>
</body>
</html>
