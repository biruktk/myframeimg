services:
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: myframe-api-local
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 3001
      UPLOAD_DIR: /app/uploads
    volumes:
      - ../backend/uploads:/app/uploads
      - ../backend/data:/app/data
    expose:
      - "3001"

  web:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: myframe-web-local
    restart: unless-stopped
    depends_on:
      - api
    env_file:
      - .env
    environment:
      NODE_ENV: production
      MYFRAME_API_URL: http://api:3001
    ports:
      - "${WEB_PORT:-3000}:3000"
