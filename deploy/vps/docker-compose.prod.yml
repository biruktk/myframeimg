services:
  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: myframe-api
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: 3001
      UPLOAD_DIR: /app/uploads
      CORS_ORIGINS: ${CORS_ORIGINS}
      FRAME_PAIRING_TOKEN: ${FRAME_PAIRING_TOKEN}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      UPLOADS_PER_MINUTE: ${UPLOADS_PER_MINUTE}
      MQTT_URL: ${MQTT_URL}
      MQTT_USER: ${MQTT_USER}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      FRAME_API_SECRET: ${FRAME_API_SECRET}
      FRAME_JWT_SECRET: ${FRAME_JWT_SECRET}
    volumes:
      - ../../backend/uploads:/app/uploads
      - ../../backend/data:/app/data
    expose:
      - "3001"

  web:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: myframe-web
    restart: unless-stopped
    environment:
      MYFRAME_API_URL: http://api:3001
      NEXT_PUBLIC_DEVICE_ID: ${NEXT_PUBLIC_DEVICE_ID}
      NODE_ENV: production
    depends_on:
      - api
    expose:
      - "3000"

  caddy:
    image: caddy:2.8-alpine
    container_name: myframe-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api

volumes:
  caddy_data:
  caddy_config:
