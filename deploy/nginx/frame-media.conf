# Serve MYFM .bin files for ESP32 frames on port 80.
# Files live in backend/uploads/ (same directory the API writes to).
#
# Install:
#   sudo cp web/deploy/nginx/frame-media.conf /etc/nginx/sites-available/frame-media
#   sudo ln -sf /etc/nginx/sites-available/frame-media /etc/nginx/sites-enabled/frame-media
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace MYFRAME_UPLOADS with your VPS path, e.g. /var/www/myframe/backend/uploads/

server {
    listen 80;
    server_name 128.241.231.234;

    location /frame-media/ {
        alias /var/www/myframe/backend/uploads/;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=3600";
        types {
            application/octet-stream bin;
        }
        default_type application/octet-stream;
    }

    location /firmware/ {
        alias /var/www/myframe/backend/uploads/firmware/;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=86400";
        types {
            application/octet-stream bin;
        }
        default_type application/octet-stream;
    }
}
